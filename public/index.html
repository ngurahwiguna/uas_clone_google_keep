<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Keep Clone</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- Google Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- ================= HEADER ================= -->

<header>

    <div class="left-header">

        <span class="material-icons menu-btn">menu</span>

        <div class="logo">
            <span class="material-icons logo-icon">lightbulb</span>
            <h2>Keep</h2>
        </div>

    </div>

    <div class="search-box">

        <span class="material-icons">search</span>

        <input
            type="text"
            id="searchInput"
            placeholder="Cari catatan..."
        >

    </div>

    <div class="header-icons">

        <span class="material-icons">refresh</span>

        <span class="material-icons">settings</span>

        <span class="material-icons">apps</span>

        <span class="material-icons">account_circle</span>

    </div>

</header>

<!-- ================= CONTAINER ================= -->

<div class="container">

<!-- ================= SIDEBAR ================= -->

<aside>

    <ul>

        <li class="active">

            <span class="material-icons">lightbulb</span>

            <span>Catatan</span>

        </li>

        <li>

            <span class="material-icons">notifications</span>

            <span>Pengingat</span>

        </li>

        <li>

            <span class="material-icons">archive</span>

            <span>Arsip</span>

        </li>

        <li>

            <span class="material-icons">delete</span>

            <span>Sampah</span>

        </li>

    </ul>

</aside>

<!-- ================= MAIN ================= -->

<main>

    <!-- Form Tambah -->

    <section class="add-note">

        <input
            type="text"
            id="title"
            placeholder="Judul"
        >

        <textarea
            id="content"
            placeholder="Tulis catatan..."
        ></textarea>

        <div class="note-footer">

            <select id="color">

                <option value="#ffffff">Putih</option>

                <option value="#F28B82">Merah</option>

                <option value="#FFF475">Kuning</option>

                <option value="#CCFF90">Hijau</option>

                <option value="#AECBFA">Biru</option>

                <option value="#D7AEFB">Ungu</option>

            </select>

            <button id="addBtn">

                <span class="material-icons">
                    add
                </span>

                Tambah

            </button>

        </div>

    </section>

    <!-- Notes -->

    <section
        class="notes"
        id="notes">

    </section>

</main>

</div>

<!-- ================= TEMPLATE CARD ================= -->

<template id="noteTemplate">

    <div class="card">

        <div class="pin-area">

            <button class="pin-btn">

                <span class="material-icons">
                    push_pin
                </span>

            </button>

        </div>

        <h3 class="note-title"></h3>

        <p class="note-content"></p>

        <div class="card-footer">

            <button class="edit-btn">

                <span class="material-icons">
                    edit
                </span>

            </button>

            <button class="delete-btn">

                <span class="material-icons">
                    delete
                </span>

            </button>

        </div>

    </div>

</template>

<script src="js/script.js"></script>

</body>
</html>
