<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Keep Clone</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Google Keep Clone</h1>
    </header>

    <main>

        <section class="note-form">
            <input type="text" placeholder="Judul Catatan">
            <textarea placeholder="Tulis catatan..."></textarea>

            <button>Tambah Catatan</button>
        </section>

        <section class="notes">

            <div class="note">
                <h3>Belajar JavaScript</h3>
                <p>Membuat clone Google Keep.</p>

                <button>Edit</button>
                <button>Hapus</button>
            </div>

        </section>

    </main>

    <script src="js/script.js"></script>

</body>
</html>
